name: Python CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install linting tools
        run: pip install ruff

      - name: Lint
        run: ruff check --select E,F,W --ignore E501 .

  test:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install numpy pandas scipy soundfile matplotlib pytest

      - name: Import smoke-test
        # Verify all modules import without error (no heavy deps required).
        # pyroomacoustics, librosa, streamlit are optional in CI.
        run: |
          python - <<'EOF'
          import importlib, sys
          modules = [
              "analyzer",
              "dataset_manager",
              "odas_classifier_parser",
              "model_interface",
          ]
          failed = []
          for m in modules:
              try:
                  importlib.import_module(m)
                  print(f"  ✅  {m}")
              except ImportError as e:
                  # Only fail on *our* code, not missing optional heavy deps
                  if "No module named" in str(e) and any(
                      dep in str(e) for dep in
                      ["pyroomacoustics", "librosa", "streamlit",
                       "soundfile", "tensorflow"]
                  ):
                      print(f"  ⚠️  {m} — optional dep missing: {e}")
                  else:
                      print(f"  ❌  {m} — {e}")
                      failed.append(m)
          if failed:
              sys.exit(1)
          EOF
        working-directory: /home/runner/work/simulator/simulator

      - name: Run unit tests
        run: pytest -x -q --ignore=test_ssl_accuracy.py --ignore=test_odas.py
        # test_ssl_accuracy and test_odas require a live ODAS binary; skip in CI
        continue-on-error: true
